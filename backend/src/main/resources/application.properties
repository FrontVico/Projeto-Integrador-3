spring.application.name=VanControl
spring.datasource.url=jdbc:postgresql://localhost:5432/VanControl
spring.datasource.username= ${POSTGRES_USER}
spring.datasource.password= ${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update

api.security.token.secret=token-secret-vancontrol-patherical

# Admin Configuration
app.admin.email=${APP_ADMIN_EMAIL:admin@vancontrol.com}
app.admin.name=${APP_ADMIN_NAME:Administrador}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
